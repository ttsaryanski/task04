name: Terraform Test

on:
  push:
    branches: [ "main" ]

jobs:
  check-bootstrap:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check if Bootstrap succeeded
        id: check
        run: |
          RESULT=$(gh run list \
            --workflow="Terraform Backend" \
            --status=success \
            --limit=1 \
            --json conclusion \
            --jq '.[0].conclusion')

          echo "Result: $RESULT"

          if [ "$RESULT" = "success" ]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "allowed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: check-bootstrap
    if: needs.check-bootstrap.outputs.allowed == 'true'
    runs-on: ubuntu-latest

    env:
      TF_VAR_sql_admin_username: ${{ secrets.TF_VAR_sql_admin_username }}
      TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_sql_admin_password }}
      TF_VAR_azure_subscription_id: ${{ secrets.TF_VAR_azure_subscription_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate