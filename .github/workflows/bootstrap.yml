name: Terraform Backend

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Terraform backend
        run: |
          az group create \
            --name taskboard-terraform-stage-rg \
            --location polandcentral
    
          az storage account create \
            --name taskboardstorageaccount \
            --resource-group taskboard-terraform-stage-rg \
            --location polandcentral \
            --sku Standard_LRS \
            --kind StorageV2
    
          az storage container create \
            --name taskboard-terraform-state-container \
            --account-name taskboardstorageaccount \
            --auth-mode login